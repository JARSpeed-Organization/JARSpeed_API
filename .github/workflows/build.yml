name: Build

on:
  push:
    branches:
      - sonarcloud
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17
      - name: Cache SonarQube packages
        uses: actions/cache@v1
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v1
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      

      - name: Generate Checkstyle Report
        run: mvn checkstyle:checkstyle

      - name: Generate SpotBugs Report
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs
      - run: ls /home/runner/work/JARSpeed_API/JARSpeed_API/target
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=JARSpeed-Organization_JARSpeed_API_AYw_LwfyJXDlN5sH1rW8 -Dsonar.projectName='JARSpeed_API'
